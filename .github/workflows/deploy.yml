name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /path/to/your-app-backend
            git pull origin main
            pnpm install
            pnpm run build
            mkdir -p logs
            if pm2 describe mbt-api-service >/dev/null 2>&1; then
              pnpm reload:pm2
            else
              pnpm start:pm2:prod
            fi
            pm2 save
